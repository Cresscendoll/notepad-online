  function checkElements() {
    Object.entries(elements).forEach(([key, element]) => {
      if (!element) {
        console.error(`❌ Не найден элемент: ${key}`);
      }
    });
  }

  // === Текстовый редактор ===
  function initNotepad() {
    if (!elements.textarea) return;
    elements.textarea.value = localStorage.getItem(AppConfig.textStorageKey) || '';
    elements.textarea.addEventListener('input', () => {
      localStorage.setItem(AppConfig.textStorageKey, elements.textarea.value);
    });
    elements.downloadBtn.addEventListener('click', downloadTextFile);
    elements.switcher.addEventListener('click', toggleTheme);
    updateTheme();
  }

  function downloadTextFile() {
    const text = elements.textarea.value;
    const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = AppConfig.filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function toggleTheme() {
    elements.switcher.classList.add('pulled');
    setTimeout(() => elements.switcher.classList.remove('pulled'), 200);
    elements.switchSound.play();
    state.isDark = !state.isDark;
    updateTheme();
  }

  function updateTheme() {
    elements.body.classList.toggle('dark-mode', state.isDark);
    elements.container.classList.toggle('dark-paper', state.isDark);
  }

  // === Таймер ===
  function initTimer() {
    const formatTime = (s) => [Math.floor(s / 3600), Math.floor((s % 3600) / 60), s % 60]
      .map(n => n.toString().padStart(2, '0')).join(':');

    const updateDisplay = () => {
      elements.timerDisplay.textContent = formatTime(state.timer.elapsedSeconds);
    };

    const start = () => {
      if (state.timer.running) return;
      state.timer.running = true;
      elements.startBtn.disabled = true;
      elements.pauseBtn.disabled = false;
      elements.startSound.play();
      state.timer.interval = setInterval(() => {
        state.timer.elapsedSeconds++;
        updateDisplay();
      }, 1000);
    };

    const pause = () => {
      if (!state.timer.running) return;
      state.timer.running = false;
      elements.startBtn.disabled = false;
      elements.pauseBtn.disabled = true;
      elements.pauseSound.play();
      clearInterval(state.timer.interval);
    };

    const reset = () => {
      pause();
      state.timer.elapsedSeconds = 0;
      elements.resetSound.play();
      updateDisplay();
    };

    elements.startBtn.addEventListener('click', start);
    elements.pauseBtn.addEventListener('click', pause);
    elements.resetBtn.addEventListener('click', reset);
    updateDisplay();
  }

  // === Чат с Палычем ===
  function initPalychChat() {
    restoreChat();
    elements.palychBtn.addEventListener('click', openPalychModal);
    elements.palychClose.addEventListener('click', closePalychModal);
    elements.palychSend.addEventListener('click', sendPalychMessage);
    elements.palychInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendPalychMessage();
      }
    });
    elements.palychForget.addEventListener('click', forgetChatHistory);
    elements.palychModal.addEventListener('click', e => {
      if (e.target === elements.palychModal) closePalychModal();
    });
    elements.palychInput.addEventListener('input', adjustInputHeight);
    adjustInputHeight();
  }

  function openPalychModal() {
    elements.palychModal.classList.add('active');
    elements.palychInput.focus();
    renderChat();
  }

  function closePalychModal() {
    elements.palychModal.classList.remove('active');
    saveChat();
  }

  function adjustInputHeight() {
    elements.palychInput.style.height = 'auto';
    elements.palychInput.style.height = elements.palychInput.scrollHeight + 'px';
    elements.palychSend.disabled = !elements.palychInput.value.trim();
  }

  function restoreChat() {
    const saved = localStorage.getItem(AppConfig.chatHistoryKey);
    state.chatHistory = saved ? JSON.parse(saved) : [{
      role: 'assistant',
      content: 'Здравствуй! Я Владимир Вольфович. Спрашивай — не бойся!'
    }];
    renderChat();
  }

  function saveChat() {
    localStorage.setItem(AppConfig.chatHistoryKey, JSON.stringify(state.chatHistory));
  }

  function renderChat() {
    elements.palychMessages.innerHTML = '';
    state.chatHistory.forEach(msg => {
      const div = document.createElement('div');
      div.className = `message ${msg.role}-message`;
      div.innerHTML = marked.parse(msg.content);
      elements.palychMessages.appendChild(div);
    });
    elements.palychMessages.scrollTop = elements.palychMessages.scrollHeight;
  }

  async function sendPalychMessage() {
    const message = elements.palychInput.value.trim();
    if (!message) return;

    addMessage('user', message);
    elements.palychInput.value = '';
    elements.palychSend.disabled = true;
    elements.thinkingIndicator.classList.add('visible');

    try {
      const response = await sendMessageToPalych(message, state.chatHistory);
      if (response.error) {
        addMessage('assistant', `Ошибка: ${response.error}`);
        return;
      }

      const reply = response.response || 'Палыч молчит...';
      addMessage('assistant', reply);
    } catch (err) {
      addMessage('assistant', `Ошибка: ${err.message}`);
    } finally {
      elements.thinkingIndicator.classList.remove('visible');
      elements.palychSend.disabled = false;
      adjustInputHeight();
    }
  }

  function addMessage(role, content) {
    state.chatHistory.push({ role, content });
    saveChat();
    renderChat();
  }

  // === Инициализация ===
  document.addEventListener('DOMContentLoaded', () => {
    checkElements();
    initNotepad();
    initTimer();
    initPalychChat();
    const easterButton = document.querySelector('.easter-button');
    if (easterButton) easterButton.addEventListener('click', () => {
      elements.videoWrapper?.classList.toggle('active');
      const video = elements.videoWrapper?.querySelector('video');
      if (video && elements.videoWrapper.classList.contains('active')) {
        video.currentTime = 0;
        video.play();
      }
    });
  });
</script>

</body>
</html>
