  <script>

  const textarea = document.getElementById('notepad');
  const downloadBtn = document.getElementById('downloadBtn');
  const palychBtn = document.getElementById('palychBtn');
  const switcher = document.getElementById('switcher');
  const body = document.body;
  const container = document.getElementById('notepadContainer');
  const switchSound = document.getElementById('switchSound');
  const timeGirl = document.getElementById('timeGirl');

  let isDark = true;
  body.classList.add('dark-mode');
  container.classList.add('dark-paper');

  // Восстановление текста из localStorage
  textarea.value = localStorage.getItem('savedText') || '';

  // Сохранение текста при изменении
  textarea.addEventListener('input', () => {
    localStorage.setItem('savedText', textarea.value);
  });

  // Скачивание файла
  downloadBtn.addEventListener('click', () => {
    const text = textarea.value;
    const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'central_narodny_blocknot.txt';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  });

  // Переключение видео
  function toggleVideo() {
    const videoBox = document.getElementById('videoWrapper');
    videoBox.classList.toggle('active');
    
    if (videoBox.classList.contains('active')) {
      const video = videoBox.querySelector('video');
      video.currentTime = 0;
      video.play();
    }
  }

  // Переключение темы
  switcher.addEventListener('click', () => {
    switcher.classList.add('pulled');
    setTimeout(() => {
      switcher.classList.remove('pulled');
    }, 200);

    switchSound.currentTime = 0;
    switchSound.play();

    isDark = !isDark;
    body.classList.toggle('dark-mode', isDark);
    container.classList.toggle('dark-paper', isDark);
  });

  // Секундомер
  const timerDisplay = document.getElementById('timerDisplay');
  const resetBtn = document.getElementById('resetBtn');
  const pauseBtn = document.getElementById('pauseBtn');
  const startBtn = document.getElementById('startBtn');
  const timerContainer = document.getElementById('timerContainer');

  const startSound = document.getElementById('startSound');
  const pauseSound = document.getElementById('pauseSound');
  const resetSound = document.getElementById('resetSound');

  let elapsedSeconds = 0;
  let running = false;
  let timerInterval = null;

  function showTimeGirl() {
    timeGirl.classList.add('visible');
  }

  function hideTimeGirl() {
    timeGirl.classList.remove('visible');
  }

  timerContainer.addEventListener('mouseenter', showTimeGirl);
  timerContainer.addEventListener('mouseleave', hideTimeGirl);

  const timerButtons = [startBtn, pauseBtn, resetBtn];
  timerButtons.forEach(button => {
    button.addEventListener('mouseenter', showTimeGirl);
    button.addEventListener('mouseleave', hideTimeGirl);
  });

  function formatTime(seconds) {
    const hrs = Math.floor(seconds / 3600);
    const mins = Math.floor((seconds % 3600) / 60);
    const secs = seconds % 60;
    return [
      hrs.toString().padStart(2, '0'),
      mins.toString().padStart(2, '0'),
      secs.toString().padStart(2, '0'),
    ].join(':');
  }

  function updateTimerDisplay() {
    timerDisplay.textContent = formatTime(elapsedSeconds);
  }

  function startTimer() {
    if (running) return;
    
    running = true;
    startBtn.disabled = true;
    pauseBtn.disabled = false;
    
    startSound.currentTime = 0;
    startSound.play();
    
    timerInterval = setInterval(() => {
      elapsedSeconds++;
      updateTimerDisplay();
    }, 1000);
  }

  function pauseTimer() {
    if (!running) return;
    
    running = false;
    startBtn.disabled = false;
    pauseBtn.disabled = true;
    
    pauseSound.currentTime = 0;
    pauseSound.play();
    
    clearInterval(timerInterval);
  }

  function resetTimer() {
    if (running) pauseTimer();
    
    elapsedSeconds = 0;
    
    resetSound.currentTime = 0;
    resetSound.play();
    
    updateTimerDisplay();
  }

  startBtn.addEventListener('click', startTimer);
  pauseBtn.addEventListener('click', pauseTimer);
  resetBtn.addEventListener('click', resetTimer);

  updateTimerDisplay();

  // Функционал Палыча
  const palychModal = document.getElementById('palychModal');
  const palychClose = document.getElementById('palychClose');
  const palychMessages = document.getElementById('palychMessages');
  const palychInput = document.getElementById('palychInput');
  const palychSend = document.getElementById('palychSend');
  const thinkingIndicator = document.getElementById('thinkingIndicator');
  const palychForget = document.getElementById('palychForget');

  // Массив для хранения сообщений в памяти
  let chatHistory = [];

  // Восстановление диалога из localStorage
  function restoreChat() {
    const savedChat = localStorage.getItem('palychChatHistory');
    if (savedChat) {
      try {
        chatHistory = JSON.parse(savedChat);
        // Проверяем корректность структуры данных
        if (!Array.isArray(chatHistory)) {
          throw new Error('Invalid chat history format');
        }
        
        // Валидируем каждое сообщение
        chatHistory = chatHistory.filter(msg => 
          msg && 
          typeof msg === 'object' && 
          msg.role && 
          ['user', 'assistant'].includes(msg.role) && 
          msg.content && 
          typeof msg.content === 'string'
        );
        
        renderChat();
      } catch (error) {
        console.error('Error restoring chat:', error);
        initializeChat();
      }
    } else {
      initializeChat();
    }
  }

  // Инициализация чата с приветствием
  function initializeChat() {
    chatHistory = [{
      role: 'assistant',
      content: 'Здравствуй Я Владимир Вольфович — помогу чем смогу. Спрашивай! Не бойся!'
    }];
    renderChat();
    saveChat();
  }

  // Отрисовка чата на основе истории
  function renderChat() {
    palychMessages.innerHTML = '';
    chatHistory.forEach(msg => {
      const messageDiv = document.createElement('div');
      messageDiv.classList.add('message', msg.role === 'user' ? 'user-message' : 'assistant-message');
      messageDiv.textContent = msg.content;
      palychMessages.appendChild(messageDiv);
    });
    palychMessages.scrollTop = palychMessages.scrollHeight;
  }

  // Сохранение истории чата
  function saveChat() {
    try {
      localStorage.setItem('palychChatHistory', JSON.stringify(chatHistory));
    } catch (error) {
      console.error('Error saving chat:', error);
    }
  }

  // Очистка диалога
  function forgetChat() {
    chatHistory = [{
      role: 'assistant',
      content: 'Здравствуй! Я Владимир Вольфович — Спрашивай, помогу чем смогу.'
    }];
    renderChat();
    localStorage.removeItem('palychChatHistory');
    saveChat();
  }

  // Получаем размеры блокнота для окна Палыча
  function updatePalychDialogSize() {
    const notepadRect = document.getElementById('notepadContainer').getBoundingClientRect();
    const dialog = document.querySelector('.palych-dialog');
    
    if (window.innerWidth < 768) {
      dialog.style.width = '95%';
      dialog.style.height = '95vh';
    } else {
      dialog.style.width = `${notepadRect.width}px`;
      dialog.style.height = `${notepadRect.height}px`;
    }
  }

  // Обработчик изменения размера окна
  window.addEventListener('resize', updatePalychDialogSize);

  // Инициализация размера окна Палыча
  updatePalychDialogSize();

  // Открытие/закрытие модального окна Палыча
  palychBtn.addEventListener('click', () => {
    palychModal.classList.add('active');
    palychInput.focus();
    restoreChat();
  });

  palychClose.addEventListener('click', () => {
    palychModal.classList.remove('active');
    saveChat();
  });

  palychForget.addEventListener('click', forgetChat);

  palychModal.addEventListener('click', (e) => {
    if (e.target === palychModal) {
      palychModal.classList.remove('active');
      saveChat();
    }
  });

  // Функция для плавного вывода текста
  async function typeWriter(text, element, speed = 15) {
  return new Promise((resolve) => {
    const lines = text.split(/\n+/).filter(line => line.trim() !== '');
    let lineIndex = 0;

    element.innerHTML = '';
    element.classList.add('typing');

    function typeLine() {
      if (lineIndex >= lines.length) {
        element.classList.remove('typing');
        resolve();
        return;
      }

      const paragraph = document.createElement('p');
      element.appendChild(paragraph);

      let charIndex = 0;
      const line = lines[lineIndex];

      function typeChar() {
        if (charIndex < line.length) {
          paragraph.textContent += line.charAt(charIndex);
          charIndex++;
          paragraph.scrollIntoView({ behavior: 'smooth', block: 'end' });
          setTimeout(typeChar, speed);
        } else {
          lineIndex++;
          setTimeout(typeLine, speed * 2); // пауза между абзацами
        }
      }

      typeChar();
    }

    typeLine();
  });
}


  // Добавление сообщения в историю и отрисовка
  function addMessageToHistory(content, role) {
    chatHistory.push({ role, content });
    
    const messageDiv = document.createElement('div');
    messageDiv.classList.add('message', role === 'user' ? 'user-message' : 'assistant-message');
    messageDiv.textContent = content;
    palychMessages.appendChild(messageDiv);
    messageDiv.scrollIntoView({ behavior: 'smooth', block: 'end' });
    
    saveChat();
    return messageDiv;
  }

  // Отправка сообщения Палычу
  // Функция для плавного вывода текста
async function typeWriter(text, element, speed = 20) {
  return new Promise((resolve) => {
    // Улучшенное разбиение на реплики:
    // 1. Разделяем по строкам с жирными именами (**Имя:**)
    // 2. Разделяем по строкам с обычными именами (Имя:)
    // 3. Добавляем двойной перенос строки перед каждой новой репликой
    const formattedText = text
      .replace(/(\*\*[А-Яа-яёЁA-Za-z]+:\*\*)/g, '\n\n$1')
      .replace(/([А-Яа-яёЁA-Za-z]+:)/g, '\n\n$1')
      .replace(/\n{3,}/g, '\n\n'); // Удаляем лишние переносы

    const parts = formattedText.split('\n\n').filter(p => p.trim() !== '');
    
    element.innerHTML = '';
    element.classList.add('typing');

    let partIndex = 0;

    function typePart() {
      if (partIndex >= parts.length) {
        element.classList.remove('typing');
        resolve();
        return;
      }

      const part = parts[partIndex];
      const isNewSpeaker = part.match(/^(\*\*.+:\*\*|.+:)/);
      
      const paragraph = document.createElement('div');
      if (isNewSpeaker && partIndex > 0) {
        paragraph.style.marginTop = '15px'; // Добавляем отступ для новой реплики
      }
      element.appendChild(paragraph);

      let charIndex = 0;

      function typeChar() {
        if (charIndex < part.length) {
          paragraph.textContent += part.charAt(charIndex);
          charIndex++;
          paragraph.scrollIntoView({ behavior: 'smooth', block: 'end' });
          setTimeout(typeChar, speed);
        } else {
          partIndex++;
          setTimeout(typePart, speed * 2);
        }
      }

      typeChar();
    }

    typePart();
  });
}

  // Автоматическое увеличение высоты textarea при вводе
  palychInput.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = (this.scrollHeight) + 'px';
    
    const trimmedValue = this.value.trim();
    palychSend.disabled = trimmedValue === '';
  });

  // Инициализация состояния кнопки
  palychSend.disabled = true;

  // Инициализация чата при загрузке страницы
  document.addEventListener('DOMContentLoaded', () => {
    restoreChat();
  });
</script>
