<body>

  <!-- Блокнот и кнопки -->
<div class="notepad-section">
    <img src="images/left.png" alt="Левое изображение" class="side-image" />
  <div class="container-wrapper">
    <div class="container" id="notepadContainer">
      <div class="header-text">

          Просто пиши — всё сохранится автоматически.

<!-- Таймер -->
<div id="timerContainer" aria-label="Секундомер">
  <div id="timerDisplay">00:00:00</div>
  <div class="timer-buttons">
    <button id="resetBtn" type="button">Сброс</button>
    <button id="pauseBtn" type="button" disabled>Пауза</button>
    <button id="startBtn" type="button">Запустить</button>
  </div>
</div>

  <button class="easter-button" onclick="toggleVideo()">?</button>

  <div class="video-wrapper" id="videoWrapper">
    <video controls>
      <source src="video/easteregg.mp4" type="video/mp4" />
      Ваш браузер не поддерживает видео.
    </video>
  </div>

<script>
  // === Конфигурация ===
  const AppConfig = {
    defaultDarkMode: true,
    textStorageKey: 'savedText',
    filename: 'notepad.txt'
  };

  // === DOM элементы ===
  const elements = {
    textarea: document.getElementById('notepad'),
    downloadBtn: document.getElementById('downloadBtn'),
    switcher: document.getElementById('switcher'),
    body: document.body,
    container: document.getElementById('notepadContainer'),
    switchSound: document.getElementById('switchSound'),
    timeGirl: document.getElementById('timeGirl'),
    timerDisplay: document.getElementById('timerDisplay'),
    resetBtn: document.getElementById('resetBtn'),
    pauseBtn: document.getElementById('pauseBtn'),
    startBtn: document.getElementById('startBtn'),
    timerContainer: document.getElementById('timerContainer'),
    startSound: document.getElementById('startSound'),
    pauseSound: document.getElementById('pauseSound'),
    resetSound: document.getElementById('resetSound'),
    videoWrapper: document.getElementById('videoWrapper')
  };

  const state = {
    isDark: AppConfig.defaultDarkMode,
    timer: {
      elapsedSeconds: 0,
      running: false,
      interval: null
    }
  };

  function checkElements() {
    Object.entries(elements).forEach(([key, element]) => {
      if (!element) {
        console.error(`❌ Не найден элемент: ${key}`);
      }
    });
  }

  // === Текстовый редактор ===
  function initNotepad() {
    if (!elements.textarea) return;
    elements.textarea.value = localStorage.getItem(AppConfig.textStorageKey) || '';
    elements.textarea.addEventListener('input', () => {
      localStorage.setItem(AppConfig.textStorageKey, elements.textarea.value);
    });
    elements.downloadBtn.addEventListener('click', downloadTextFile);
    elements.switcher.addEventListener('click', toggleTheme);
    updateTheme();
  }

  function downloadTextFile() {
    const text = elements.textarea.value;
    const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = AppConfig.filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function toggleTheme() {
    elements.switcher.classList.add('pulled');
    setTimeout(() => elements.switcher.classList.remove('pulled'), 200);
    elements.switchSound.play();
    state.isDark = !state.isDark;
    updateTheme();
  }

  function updateTheme() {
    elements.body.classList.toggle('dark-mode', state.isDark);
    elements.container.classList.toggle('dark-paper', state.isDark);
  }

  // === Таймер ===
  function initTimer() {
    const formatTime = (s) => [Math.floor(s / 3600), Math.floor((s % 3600) / 60), s % 60]
      .map(n => n.toString().padStart(2, '0')).join(':');

    const updateDisplay = () => {
      elements.timerDisplay.textContent = formatTime(state.timer.elapsedSeconds);
    };

    const start = () => {
      if (state.timer.running) return;
      state.timer.running = true;
      elements.startBtn.disabled = true;
      elements.pauseBtn.disabled = false;
      elements.startSound.play();
      state.timer.interval = setInterval(() => {
        state.timer.elapsedSeconds++;
        updateDisplay();
      }, 1000);
    };

    const pause = () => {
      if (!state.timer.running) return;
      state.timer.running = false;
      elements.startBtn.disabled = false;
      elements.pauseBtn.disabled = true;
      elements.pauseSound.play();
      clearInterval(state.timer.interval);
    };

    const reset = () => {
      pause();
      state.timer.elapsedSeconds = 0;
      elements.resetSound.play();
      updateDisplay();
    };

    elements.startBtn.addEventListener('click', start);
    elements.pauseBtn.addEventListener('click', pause);
    elements.resetBtn.addEventListener('click', reset);
    updateDisplay();
  }

  // === Инициализация ===
  document.addEventListener('DOMContentLoaded', () => {
    checkElements();
    initNotepad();
    initTimer();
    const easterButton = document.querySelector('.easter-button');
    if (easterButton) easterButton.addEventListener('click', () => {
      elements.videoWrapper?.classList.toggle('active');
      const video = elements.videoWrapper?.querySelector('video');
      if (video && elements.videoWrapper.classList.contains('active')) {
        video.currentTime = 0;
        video.play();
      }
    });
  });
</script>
